name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Tests
        run: pnpm test

      - name: Biome Check
        run: pnpm biome ci .

      - name: Type Check for src
        run: pnpm type

      - name: Type Check for test
        run: pnpm type:test

      - name: Type Check for pipeline
        run: pnpm type:pipe

      - name: Type Check for playwright
        run: pnpm type:playwright

      - name: Lint Check
        run: pnpm lint

      - name: Build Check
        run: pnpm build

      - name: Audit dependencies
        run: pnpm audit --prod